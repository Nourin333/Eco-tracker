<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-Earnings Carbon Tracker</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <div id="monthly-reminder" class="notification-banner"></div>

    <nav class="navbar">
        <a href="/" class="navbar-brand" style="background: linear-gradient(90deg, #05f2c7, #10b981); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">
            🌿 Eco-Earnings
        </a>
        <div class="nav-links">
            {% if session.get('user_id') %}
                <a href="/dashboard">Dashboard</a>
                <a href="/input">Submit Data</a>
                <a href="#" id="logout-btn">Logout</a>
            {% else %}
                <a href="/login">Login</a>
                <a href="/register">Register</a>
            {% endif %}
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
