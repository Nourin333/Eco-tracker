{% extends "base.html" %}

{% block content %}
<div class="form-container animate-fade-in">
    <div class="glass-panel">
        <h1>Track Your Impact</h1>
        <p class="text-center mb-4">Enter your consumption data below</p>
        
        <div id="alert-box"></div>
        
        <form id="input-form">
            <div class="form-group">
                <label for="month">Month (Optional)</label>
                <input type="month" id="month" style="width: 100%; padding: 0.875rem 1rem; background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 0.75rem; color: #fff; font-size: 1rem; color-scheme: dark;">
                <p style="font-size: 0.8rem; color: #cbd5e1; margin-top: 0.3rem;">Leave blank for current month</p>
            </div>
            
            <div class="form-group">
                <label for="electricity_units">Monthly Electricity (Units/kWh)</label>
                <input type="number" id="electricity_units" step="any" placeholder="e.g. 250">
            </div>
            
            <div class="form-group">
                <label for="petrol_litres">Weekly Petrol Usage (Litres)</label>
                <input type="number" id="petrol_litres" step="any" placeholder="e.g. 15">
            </div>
            
            <button type="submit" class="btn">Calculate & Submit</button>
        </form>
        
        <p class="text-center mt-4" style="font-size: 0.875rem; color: #94a3b8;">
            Tip: If you leave fields blank, we'll use your data from last month to keep your streak!
        </p>
    </div>
</div>
{% endblock %}
